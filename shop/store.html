<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HINOKA | Official Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/global.css">
  <style>
    /* ── Hero Slider ── */
    .hero-slider {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
    }

    .slide {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      transition: opacity 1.2s ease-in-out;
    }

    .slide.active { opacity: 1; }

    /*
      ★ 実際の画像は assets/images/hero-1.jpg ～ hero-5.jpg を配置してください。
         ここでは placeholder として unsplash の画像URLを使用しています。
         本番では自社画像に差し替えてください。
    */
    .slide:nth-child(1) { background-image: url('assets/images/hero-1.jpg'); }
    .slide:nth-child(2) { background-image: url('assets/images/hero-2.jpg'); }
    .slide:nth-child(3) { background-image: url('assets/images/hero-3.jpg'); }
    .slide:nth-child(4) { background-image: url('assets/images/hero-4.jpg'); }
    .slide:nth-child(5) { background-image: url('assets/images/hero-5.jpg'); }

    /* オーバーレイ（テキスト可読性確保） */
    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.18);
    }

    /* スライダードット */
    .slider-dots {
      position: absolute;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      cursor: pointer;
      transition: background 0.3s, transform 0.3s;
    }

    .dot.active {
      background: #fff;
      transform: scale(1.3);
    }

    /* スライダーキャプション */
    .slide-caption {
      position: absolute;
      bottom: 80px;
      left: 64px;
      z-index: 10;
      color: #fff;
    }

    .slide-caption h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(28px, 4vw, 52px);
      font-weight: 300;
      letter-spacing: 0.15em;
      line-height: 1.3;
    }

    .slide-caption p {
      margin-top: 12px;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    /* ── Section: Featured Categories ── */
    .section-featured {
      padding: 80px 48px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-align: center;
      margin-bottom: 48px;
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }

    .category-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      aspect-ratio: 3/4;
    }

    .category-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 0.6s ease;
    }

    .category-card:hover img {
      transform: scale(1.05);
    }

    .category-card-label {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 32px 24px 24px;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      color: #fff;
    }

    .category-card-label h3 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 400;
      letter-spacing: 0.1em;
    }

    .category-card-label span {
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.8;
    }

    @media (max-width: 768px) {
      .category-grid { grid-template-columns: 1fr; }
      .section-featured { padding: 60px 24px; }
      .slide-caption { left: 24px; bottom: 72px; }
    }
  </style>
</head>
<body>

  <!-- ナビゲーション（nav.jsが挿入） -->

  <!-- ヒーロースライダー -->
  <section class="hero-slider" id="heroSlider" aria-label="メインビジュアル">
    <div class="slide active"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>
    <div class="slide"></div>

    <!-- キャプション（スライドごとに切り替え可） -->
    <div class="slide-caption">
      <h2>New Collection<br>2025</h2>
      <p>Shop Now</p>
    </div>

    <!-- ドットインジケーター -->
    <div class="slider-dots" id="sliderDots"></div>
  </section>

  <!-- Featured Categories -->
  <section class="section-featured">
    <h2 class="section-title">Collections</h2>
    <div class="category-grid">
      <div class="category-card" onclick="location.href='product-list.html?category=pet'">
        <img src="assets/images/cat-pet.jpg" alt="ペット用品">
        <div class="category-card-label">
          <span>Category</span>
          <h3>ペット用品</h3>
        </div>
      </div>
      <div class="category-card" onclick="location.href='product-list.html?category=fashion'">
        <img src="assets/images/cat-fashion.jpg" alt="ファッション">
        <div class="category-card-label">
          <span>Category</span>
          <h3>ファッション</h3>
        </div>
      </div>
      <div class="category-card" onclick="location.href='product-list.html?category=daily'">
        <img src="assets/images/cat-daily.jpg" alt="生活雑貨">
        <div class="category-card-label">
          <span>Category</span>
          <h3>生活雑貨</h3>
        </div>
      </div>
    </div>
  </section>

  <script src="js/nav.js"></script>
  <script>
    // ── Hero Slider ──
    (function () {
      const slides = document.querySelectorAll('.slide');
      const dotsContainer = document.getElementById('sliderDots');
      let current = 0;
      let timer;

      // ドット生成
      slides.forEach((_, i) => {
        const dot = document.createElement('button');
        dot.className = 'dot' + (i === 0 ? ' active' : '');
        dot.setAttribute('aria-label', `スライド ${i + 1}`);
        dot.addEventListener('click', () => goTo(i));
        dotsContainer.appendChild(dot);
      });

      function goTo(index) {
        slides[current].classList.remove('active');
        dotsContainer.children[current].classList.remove('active');
        current = index;
        slides[current].classList.add('active');
        dotsContainer.children[current].classList.add('active');
        resetTimer();
      }

      function next() {
        goTo((current + 1) % slides.length);
      }

      function resetTimer() {
        clearInterval(timer);
        timer = setInterval(next, 5000);
      }

      resetTimer();
    })();
  </script>
</body>
</html>
