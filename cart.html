<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>...
/**
 * cart-session.js
 * ・未ログイン：ブラウザを閉じるとカートをクリア（sessionStorageで管理）
 * ・ログイン中：カートをlocalStorageに保持（ページをまたいで維持）
 *
 * 全ページの nav.js より後に読み込む
 * <script src="js/cart-session.js"></script>
 */

(function () {
  // Firebaseのonfo AuthStateChangedを使ってログイン状態を確認
  // firebase-config.jsが読み込まれている前提

  const CART_KEY = 'cartItems';

  // ── セッション管理ロジック ──────────────────────────────
  // sessionStorageはタブ/ウィンドウを閉じると消える
  // localStorageは永続

  function getSessionFlag() {
    return sessionStorage.getItem('hinoka_session_active');
  }

  function setSessionFlag() {
    sessionStorage.setItem('hinoka_session_active', '1');
  }

  function isLoggedIn() {
    // sessionStorageにユーザー情報があるか確認
    return !!sessionStorage.getItem('hinoka_session');
  }

  // ── 初回アクセス時：未ログインならカートをクリア ────────
  function initCartSession() {
    const sessionActive = getSessionFlag();

    if (!sessionActive) {
      // 新しいブラウザセッション（タブを閉じて再度開いた）
      if (!isLoggedIn()) {
        // 未ログインならカートをクリア
        localStorage.removeItem(CART_KEY);
        localStorage.removeItem('hinoka_cart');
        console.log('新規セッション：未ログインのためカートをクリアしました');
      }
      // セッションフラグを立てる
      setSessionFlag();
    }
  }

  // ── Firebase Auth 状態変化を監視 ───────────────────────
  // account.htmlでFirebaseが初期化された後に連携
  function setupAuthListener() {
    // Firebase Authが利用可能な場合のみ
    if (typeof firebase !== 'undefined' && firebase.auth) {
      firebase.auth().onAuthStateChanged((user) => {
        if (user) {
          // ログイン：カートを保持
          console.log('ログイン中：カートを保持します');
        } else {
          // ログアウト時は次回アクセスでクリアされる
          // （sessionStorageのフラグが消えるため）
        }
      });
    }
  }

  // ── ES Module版Firebase対応 ────────────────────────────
  // account.htmlのtype="module"からカスタムイベントで通知
  window.addEventListener('hinoka_auth_login', () => {
    console.log('ログインイベント受信：カート保持モードに切替');
    // ログイン時はsessionフラグを更新
    setSessionFlag();
  });

  window.addEventListener('hinoka_auth_logout', () => {
    console.log('ログアウトイベント受信：次回起動時にカートをクリア');
    // セッションフラグを削除（次回起動時にクリアされる）
    sessionStorage.removeItem('hinoka_session_active');
    sessionStorage.removeItem('hinoka_session');
    // 即時クリア
    localStorage.removeItem(CART_KEY);
    localStorage.removeItem('hinoka_cart');
    window.dispatchEvent(new Event('cartUpdated'));
  });

  // ── 初期化実行 ─────────────────────────────────────────
  initCartSession();

})();
